name: 部署资料下载页

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: 构建网页
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: 安装网站依赖
        working-directory: site
        run: npm ci

      - name: 生成资料清单
        working-directory: site
        run: npm run generate:manifest

      - name: 构建 GitHub Pages 站点
        working-directory: site
        run: npm run build

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    name: 部署到 GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 发布 Pages
        id: deployment
        uses: actions/deploy-pages@v4
